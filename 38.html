<!DOCTYPE html>
<html>
<head>
<title>Advanced Grid Features</title>
<link rel="stylesheet" href="38.css">
</head>
<body>

<h1>Advanced CSS Grid Features</h1>

<!-- 1 Fractional Units -->

<h2>1. Fractional Units (fr)</h2>
<div class="grid-fr">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
</div>

<!-- 2 minmax() -->

<h2>2. minmax() Function</h2>
<div class="grid-minmax">
<div class="item">A</div>
<div class="item">B</div>
<div class="item">C</div>
<div class="item">D</div>
</div>

<!-- 3 repeat() Function -->

<h2>3. repeat() Function</h2>
<div class="grid-repeat">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
</div>

<!-- 4 Auto-fit and Auto-fill -->

<h2>4. Auto-fit & Auto-fill</h2>
<div class="grid-auto">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
<div class="item">5</div>
<div class="item">6</div>
</div>

<!-- 5 Grid Line Naming -->

<h2>5. Grid Line Naming</h2>
<div class="grid-line">
<div class="header">Header</div>
<div class="sidebar">Sidebar</div>
<div class="content">Content</div>
<div class="footer">Footer</div>
</div>

</body>
</html>

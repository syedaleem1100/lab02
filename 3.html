<!DOCTYPE html>
<html>

<head>

<title>CSS Pseudo Classes</title>

<link rel="stylesheet" href="../styles/effects.css">

</head>

<body>

<h1>Pseudo-classes Demonstration</h1>

<h2>1. Link States</h2>

<a href="https://google.com">Google</a>
<br><br>
<a href="https://facebook.com">Facebook</a>


<h2>2. Form States</h2>

<input type="text" placeholder="Enter your name">
<br><br>

<input type="checkbox"> Accept Terms
<br><br>

<button disabled>Disabled Button</button>


<h2>3. Structural Pseudo Classes</h2>

<ul>
<li>Item 1</li>
<li>Item 2</li>
<li>Item 3</li>
<li>Item 4</li>
</ul>


<h2>4. Content Based Pseudo Classes</h2>

<div class="box"></div>

<p class="note">Important text</p>

<p class="note special">Another paragraph</p>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Transform Gallery</title>
  <link rel="stylesheet" href="23.css">
</head>
<body>

  <h1>CSS Transform Gallery</h1>

  <div class="transform-gallery">

    <!-- Rotation -->
    <div class="transform-box rotate">Rotate 45°</div>

    <!-- Scaling -->
    <div class="transform-box scale">Scale 1.5x</div>

    <!-- Translation -->
    <div class="transform-box translate">Translate X 50px</div>

    <!-- 3D Transform -->
    <div class="transform-box rotate3d">3D Rotate</div>

    <!-- Transform Origin -->
    <div class="transform-box origin">Transform Origin</div>

    <!-- Combined Transforms -->
    <div class="transform-box combined">Scale + Rotate</div>

  </div>

</body>
</html>

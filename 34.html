<!DOCTYPE html>
<html>
<head>
<title>Flex Item Properties</title>
<link rel="stylesheet" href="34.css">
</head>

<body>

<h1>Flex Item Properties</h1>

<!-- 1 Flex Basis -->

<h2>1. Flex Basis</h2>

<div class="container basis">
<div class="item">Item 1</div>
<div class="item big">Item 2</div>
<div class="item">Item 3</div>
</div>



<!-- 2 Flex Shorthand -->

<h2>2. Flex Shorthand</h2>

<div class="container flex-short">
<div class="item flex1">Box 1</div>
<div class="item flex2">Box 2</div>
<div class="item flex3">Box 3</div>
</div>



<!-- 3 Align Self -->

<h2>3. Align Self</h2>

<div class="container align-self">
<div class="item">Item 1</div>
<div class="item special">Item 2</div>
<div class="item">Item 3</div>
</div>



<!-- 4 Order Property -->

<h2>4. Order Property</h2>

<div class="container order-example">
<div class="item first">First</div>
<div class="item second">Second</div>
<div class="item third">Third</div>
</div>

</body>
</html>

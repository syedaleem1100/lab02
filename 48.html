<!DOCTYPE html>
<html>
<head>
    <title>CSS Grid Photo Gallery</title>
    <link rel="stylesheet" href="48.css">
</head>
<body>

<h1>Responsive CSS Grid Photo Gallery</h1>

<div class="gallery">
    <div class="photo" style="grid-row: span 2;"><img src="bacha.png" alt="Photo 1"><div class="overlay">Photo 1</div></div>
    <div class="photo"><img src="bacha.png" alt="Photo 2"><div class="overlay">Photo 2</div></div>
    <div class="photo"><img src="bacha.png" alt="Photo 3"><div class="overlay">Photo 3</div></div>
    <div class="photo" style="grid-row: span 2;"><img src="bacha.png" alt="Photo 4"><div class="overlay">Photo 4</div></div>
    <div class="photo"><img src="bacha.png" alt="Photo 5"><div class="overlay">Photo 5</div></div>
    <div class="photo"><img src="bacha.png" alt="Photo 6"><div class="overlay">Photo 6</div></div>
</div>

</body>
</html>

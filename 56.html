<!DOCTYPE html>
<html>
<head>
    <title>Responsive Data Table</title>
    <link rel="stylesheet" href="56.css">
</head>
<body>

<header>
    <h1>Responsive Data Table</h1>
</header>

<main>
    <section class="table-container">
        <table class="responsive-table">
            <caption>Employee Data</caption>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Position</th>
                    <th>Department</th>
                    <th>Email</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>John Doe</td>
                    <td>Developer</td>
                    <td>IT</td>
                    <td>john@example.com</td>
                    <td>123-456-7890</td>
                </tr>
                <tr>
                    <td>Jane Smith</td>
                    <td>Designer</td>
                    <td>UI/UX</td>
                    <td>jane@example.com</td>
                    <td>321-654-0987</td>
                </tr>
                <tr>
                    <td>Mike Brown</td>
                    <td>Manager</td>
                    <td>Operations</td>
                    <td>mike@example.com</td>
                    <td>555-123-4567</td>
                </tr>
            </tbody>
        </table>
    </section>
</main>

</body>
</html>

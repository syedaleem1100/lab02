<!DOCTYPE html>
<html>
<head>
    <title>Media Query Demonstration</title>
    <link rel="stylesheet" href="52.css">
</head>
<body>

<header>
    <h1>Media Query Demo</h1>
    <nav class="nav" id="nav">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <button id="hamburger">&#9776;</button>
    </nav>
</header>

<section class="breakpoints">
    <p>Current breakpoint: <span id="breakpointLabel">Loading...</span></p>
</section>

<section class="content">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
    <div class="box">Box 4</div>
</section>

<script>
const breakpointLabel = document.getElementById('breakpointLabel');

function updateBreakpoint() {
    const width = window.innerWidth;
    let label = '';
    if(width < 600) label = 'Mobile';
    else if(width < 1024) label = 'Tablet';
    else label = 'Desktop';
    breakpointLabel.textContent = label + ' (' + width + 'px)';
}

window.addEventListener('resize', updateBreakpoint);
window.addEventListener('load', updateBreakpoint);

// Hamburger toggle for mobile nav
const hamburger = document.getElementById('hamburger');
const nav = document.getElementById('nav');

hamburger.addEventListener('click', ()=>{
    nav.classList.toggle('show');
});
</script>

</body>
</html>

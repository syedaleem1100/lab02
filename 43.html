<!DOCTYPE html>
<html>
<head>
    <title>Display Property Showcase</title>
    <link rel="stylesheet" href="43.css">
</head>
<body>

<h1>Display Property Showcase</h1>

<!-- 1. Block, Inline, Inline-block -->
<h2>1. Block vs Inline vs Inline-block</h2>
<div class="block">Block Div</div>
<span class="inline">Inline Span</span>
<span class="inline">Inline Span 2</span>
<div class="inline-block">Inline-block Div 1</div>
<div class="inline-block">Inline-block Div 2</div>

<!-- 2. Table display without table markup -->
<h2>2. Table Display</h2>
<div class="table">
    <div class="row">
        <div class="cell">Row 1 Cell 1</div>
        <div class="cell">Row 1 Cell 2</div>
    </div>
    <div class="row">
        <div class="cell">Row 2 Cell 1</div>
        <div class="cell">Row 2 Cell 2</div>
    </div>
</div>

<!-- 3. Hidden elements demonstration -->
<h2>3. Hidden Elements</h2>
<div class="visible">Visible on all screens</div>
<div class="hidden">Hidden on small screens</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Styling</title>
  <link rel="stylesheet" href="20.css">
</head>
<body>

  <header>
    <h1>Registration Form</h1>
  </header>

  <section class="form-container">
    <form id="registration-form">

      <!-- Name Field -->
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required>

      <!-- Email Field -->
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <!-- Password Field -->
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter a password" required>

      <!-- Gender Dropdown -->
      <label for="gender">Gender</label>
      <select id="gender" name="gender">
        <option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <!-- Terms Checkbox -->
      <label class="checkbox-label">
        <input type="checkbox" id="terms" name="terms">
        I agree to the terms and conditions
      </label>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-medium btn-primary">Register</button>

      <!-- Success & Error Messages -->
      <p class="success-message">Registration successful!</p>
      <p class="error-message">Please fill all required fields correctly.</p>

    </form>
  </section>

</body>
</html>

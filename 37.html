<!DOCTYPE html>
<html>
<head>
<title>Grid Item Properties</title>
<link rel="stylesheet" href="37.css">
</head>
<body>

<h1>CSS Grid Item Properties</h1>

<!-- 1 Grid Column -->

<h2>1. Grid Column</h2>
<div class="grid-column">
<div class="item">Item 1</div>
<div class="item span2">Item 2</div>
<div class="item">Item 3</div>
</div>

<!-- 2 Grid Row -->

<h2>2. Grid Row</h2>
<div class="grid-row">
<div class="item">A</div>
<div class="item row2">B</div>
<div class="item">C</div>
</div>

<!-- 3 Grid Area -->

<h2>3. Grid Area</h2>
<div class="grid-area">
<div class="header">Header</div>
<div class="sidebar">Sidebar</div>
<div class="content">Content</div>
<div class="footer">Footer</div>
</div>

<!-- 4 Justify-Self & Align-Self -->

<h2>4. Justify & Align Self</h2>
<div class="grid-align-self">
<div class="item">1</div>
<div class="item special">2</div>
<div class="item">3</div>
</div>

</body>
</html>

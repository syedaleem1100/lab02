<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Styling Collection</title>
  <link rel="stylesheet" href="19.css">
</head>
<body>

  <header>
    <h1>Button Styling Collection</h1>
  </header>

  <section class="button-gallery">

    <!-- 1️⃣ Small Primary Button -->
    <button class="btn btn-small btn-primary">Small Primary</button>

    <!-- 2️⃣ Medium Secondary Button -->
    <button class="btn btn-medium btn-secondary">Medium Secondary</button>

    <!-- 3️⃣ Large Success Button -->
    <button class="btn btn-large btn-success">Large Success</button>

    <!-- 4️⃣ Rounded Gradient Button -->
    <button class="btn btn-large btn-gradient">Gradient Button</button>

    <!-- 5️⃣ Disabled Button -->
    <button class="btn btn-medium btn-disabled" disabled>Disabled</button>

  </section>

</body>
</html>

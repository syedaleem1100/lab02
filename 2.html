<!DOCTYPE html>
<html>

<head>

<title>CSS Combinators Demo</title>

<link rel="stylesheet" href="2.css">

</head>

<body>

<h1>CSS Combinators Example</h1>

<div class="container">

<p>This paragraph is inside the div (direct child).</p>

<section>
<p>This paragraph is inside a section inside the div.</p>
</section>

</div>

<h2>Heading Two</h2>

<p>This paragraph comes immediately after h2.</p>

<p>This paragraph is another sibling after h2.</p>

<p>This paragraph is also a sibling after h2.</p>

</body>

</html>

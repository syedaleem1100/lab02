<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Component Design</title>
  <link rel="stylesheet" href="21.css">
</head>
<body>

  <header>
    <h1>Product/Service Cards</h1>
  </header>

  <section class="card-container">

    <!-- Card 1 -->
    <div class="card">
      <img src="bacha.png" alt="Product 1">
      <div class="card-content">
        <h2>Product 1</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button class="btn btn-primary">Buy Now</button>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <img src="bacha.png" alt="Product 2">
      <div class="card-content">
        <h2>Product 2</h2>
        <p>Phasellus imperdiet, nulla et dictum interdum, nisi lorem.</p>
        <button class="btn btn-primary">Buy Now</button>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <img src="bacha.png" alt="Product 3">
      <div class="card-content">
        <h2>Product 3</h2>
        <p>Curabitur ac leo nunc. Vestibulum et mauris vel ante.</p>
        <button class="btn btn-primary">Buy Now</button>
      </div>
    </div>

  </section>

</body>
</html>

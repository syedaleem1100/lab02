<!DOCTYPE html>
<html lang="en">
    <head>
        <title>registeration</title>
    </head>
    <body>
        <form action="submit" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"  placeholder="enter your name" required><br><br>
            <label for="registeration">Registeration#:</label>
            <input type="number" id="registeration" name="registeration" placeholder="enter your registeration number" required><br><br>
            <label for="email">Registeration#:</label>
            <input type="email" id="email" placeholder="enter your email" required><br><br>
             <label for="password">Password:</label>
            <input type="password" id="password" placeholder="enter your password" required><br>
            <label for="course">Select courses:</label>
            <select id="course" name="course" required>
                <option value="">select course</option>
                <option value="web">web</option>
                <option value="unity">unity</option>
                <option value="3d">blender</option>
            </select><br>
            <label><input type="radio" name="course">first semester</label>
            <label><input type="radio" name="course" >second semester</label><br>
            <label><input type="checkbox" name="terms">agree with conditions</label>
            <label><input type="checkbox" name="terms">paid</label><br>
            <button type="submit">Submit</button>

        </form>
    </body>
</html>

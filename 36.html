<!DOCTYPE html>
<html>
<head>
<title>Grid Container Properties</title>
<link rel="stylesheet" href="36.css">
</head>
<body>

<h1>CSS Grid Container Properties</h1>

<!-- 1 Display Grid -->

<h2>1. Display Grid</h2>
<div class="grid-basic">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
</div>

<!-- 2 Grid Template Columns -->

<h2>2. Grid Template Columns</h2>
<div class="grid-columns">
<div class="item">A</div>
<div class="item">B</div>
<div class="item">C</div>
</div>

<!-- 3 Grid Template Rows -->

<h2>3. Grid Template Rows</h2>
<div class="grid-rows">
<div class="item">X</div>
<div class="item">Y</div>
<div class="item">Z</div>
</div>

<!-- 4 Grid Template Areas -->

<h2>4. Grid Template Areas</h2>
<div class="grid-areas">
<div class="header">Header</div>
<div class="sidebar">Sidebar</div>
<div class="main">Main Content</div>
<div class="footer">Footer</div>
</div>

<!-- 5 Gap -->

<h2>5. Gap (Gutter)</h2>
<div class="grid-gap">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
</div>

<!-- 6 Justify-items & Align-items -->

<h2>6. Justify & Align Items</h2>
<div class="grid-align">
<div class="item">A</div>
<div class="item">B</div>
<div class="item">C</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Flex Container Properties</title>
<link rel="stylesheet" href="33.css">
</head>

<body>

<h1>Flex Container Properties</h1>

<!-- 1 Display Flex -->

<h2>1. Display Flex</h2>

<div class="flex-container">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
</div>



<!-- 2 Flex Direction -->

<h2>2. Flex Direction</h2>

<div class="flex-row">
<div class="item">A</div>
<div class="item">B</div>
<div class="item">C</div>
</div>

<div class="flex-column">
<div class="item">A</div>
<div class="item">B</div>
<div class="item">C</div>
</div>



<!-- 3 Flex Wrap -->

<h2>3. Flex Wrap</h2>

<div class="flex-wrap">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
<div class="item">5</div>
<div class="item">6</div>
</div>



<!-- 4 Justify Content -->

<h2>4. Justify Content</h2>

<div class="justify-example">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
</div>



<!-- 5 Align Items -->

<h2>5. Align Items</h2>

<div class="align-items">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
</div>



<!-- 6 Align Content -->

<h2>6. Align Content</h2>

<div class="align-content">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
<div class="item">5</div>
<div class="item">6</div>
</div>

</body>
</html>

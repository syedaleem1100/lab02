<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Styling Portfolio</title>
  <link rel="stylesheet" href="18.css">
</head>
<body>

  <header>
    <h1>Image Styling Portfolio</h1>
  </header>

  <section class="gallery">

    <!-- 1️⃣ Rounded Corner Image -->
    <div class="image-card">
      <img src="bacha.png" alt="Rounded Corners">
      <p>Rounded Corners</p>
    </div>

    <!-- 2️⃣ Circular Image -->
    <div class="image-card">
      <img src="bacha.png" alt="Circular Image" class="circle">
      <p>Circular Image</p>
    </div>

    <!-- 3️⃣ Image with Border and Shadow -->
    <div class="image-card">
      <img src="bacha.png" alt="Border & Shadow" class="border-shadow">
      <p>Border & Shadow</p>
    </div>

    <!-- 4️⃣ Hover Effect Image -->
    <div class="image-card">
      <div class="hover-overlay">
        <img src="bacha.png" alt="Hover Effect">
        <div class="overlay-text">Hovered!</div>
      </div>
      <p>Hover Effect</p>
    </div>

    <!-- 5️⃣ CSS Filter Image -->
    <div class="image-card">
      <img src="bacha.png" alt="Filtered Image" class="filter">
      <p>CSS Filter</p>
    </div>

  </section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced CSS Effects</title>
  <link rel="stylesheet" href="24.css">
</head>
<body>

  <h1>Advanced CSS Effects Showcase</h1>

  <!-- Gradient Text -->
  <h2 class="gradient-text">Gradient Text Example</h2>

  <!-- Custom Checkboxes -->
  <div class="custom-form">
    <label>
      <input type="checkbox" class="custom-checkbox">
      Accept Terms
    </label>
    <label>
      <input type="radio" name="gender" class="custom-radio">
      Male
    </label>
    <label>
      <input type="radio" name="gender" class="custom-radio">
      Female
    </label>
  </div>

  <!-- Loading Animation -->
  <div class="loader"></div>

  <!-- Text Clipping -->
  <h2 class="clipped-text">Clipped Background Text</h2>

  <!-- Complex Shadows -->
  <div class="shadow-box">Fancy Shadow</div>

</body>
</html>

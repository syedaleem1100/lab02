<!DOCTYPE html>
<html>
<head>
    <title>Responsive Portfolio</title>
    <link rel="stylesheet" href="55.css">
</head>
<body>

<header>
    <h1>My Portfolio</h1>
</header>

<main class="portfolio-grid">
    <section class="about">
        <h2>About Me</h2>
        <p>This is a brief introduction about the portfolio owner. Experience, skills, and projects are highlighted.</p>
    </section>

    <section class="projects">
        <h2>Projects</h2>
        <div class="project-gallery">
            <div class="project">Project 1</div>
            <div class="project">Project 2</div>
            <div class="project">Project 3</div>
            <div class="project">Project 4</div>
            <div class="project">Project 5</div>
        </div>
    </section>

    <section class="contact">
        <h2>Contact</h2>
        <p>Email: example@mail.com</p>
    </section>

    <!-- Decorative element -->
    <div class="decorative-circle"></div>
</main>

<footer>
    <p>&copy; 2026 Portfolio</p>
</footer>

</body>
</html>
